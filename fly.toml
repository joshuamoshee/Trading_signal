# fly.toml app configuration file generated for trading-signal on 2026-05-29T13:43:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-signal'
primary_region = 'ams'

[build]

[env]
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
